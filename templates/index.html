<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Audio Transcriber by Aqtuaa</title>
        <link rel="stylesheet" href="../static/style.css">
    </head>
    <body>
        <div class="container">
            <h1>Audio Transcriber</h1>
            <p class="sub">Upload your Audio File that you want to Transcribe</p>

            <form id="uploadForm">
                <input type="file" id="audioFile" accept="audio/*" required>
                <button type="submit">Transcribe</button>
            </form>

            <p class ="powered">Powered by AssemblyAI</p>

            <div id="status"></div>

            <div id="resultBox" class="hidden">
                <h3>Result</h3>
                <p id="resultText"></p>
            </div>
        </div>

        <script src="../static/script.js"></script>
    </body>
</html>
